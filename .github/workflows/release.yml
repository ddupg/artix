name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: artix-x86_64-unknown-linux-gnu.tar.gz
          - runner: macos-13
            target: x86_64-apple-darwin
            archive: artix-x86_64-apple-darwin.tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: artix-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Run tests
        run: cargo test --all-targets --target ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package artifact
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.archive }} artix
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: artix-*
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
